<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CiteSpy Pro — Real Competitor Citation Finder</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080814;font-family:'DM Sans',sans-serif;color:#e0e0f0;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#3a3a6a;border-radius:99px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel{background:linear-gradient(90deg,#1a1a2e 25%,#252540 50%,#1a1a2e 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px}
input,button{font-family:inherit}
.btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#7f5af0,#2cb67d);color:#fff;font-size:15px;font-weight:800;cursor:pointer;transition:all .2s}
.btn:disabled{background:#2a2a4a;color:#505070;cursor:not-allowed}
.btn:hover:not(:disabled){filter:brightness(1.1);transform:translateY(-1px)}
.card{background:#0d0d22;border:1px solid #2a2a4a;border-radius:16px;padding:20px;margin-bottom:12px}
.comp-card{background:#0d0d22;border:1px solid #2a2a4a;border-radius:16px;margin-bottom:10px;overflow:hidden;cursor:pointer;transition:border-color .2s}
.comp-card:hover{border-color:#7f5af040}
.comp-card.open{border-color:#7f5af0}
.cite-chip{display:inline-flex;align-items:center;gap:6px;background:#13132e;border:1px solid #2a2a4a;border-radius:8px;padding:6px 12px;font-size:12px;color:#a0a0d0;margin:4px;text-decoration:none;transition:all .2s}
.cite-chip:hover{border-color:#7f5af0;color:#c0b0ff}
.spinner{width:18px;height:18px;border:2px solid #ffffff40;border-top:2px solid #fff;border-radius:50%;animation:spin .8s linear infinite}
.tag{padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700}
</style>
</head>
<body>
<div style="max-width:900px;margin:0 auto;padding:32px 20px">

  <!-- Header -->
  <div style="display:flex;align-items:center;gap:14px;margin-bottom:32px">
    <div style="width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#7f5af0,#2cb67d);display:flex;align-items:center;justify-content:center;font-size:24px">🔍</div>
    <div>
      <div style="font-size:24px;font-weight:800;font-family:'Syne',sans-serif;background:linear-gradient(90deg,#c0b0ff,#2cb67d);-webkit-background-clip:text;-webkit-text-fill-color:transparent">CiteSpy Pro</div>
      <div style="font-size:12px;color:#505080">Real Competitor Citation Intelligence</div>
    </div>
  </div>

  <!-- Input -->
  <div class="card" style="margin-bottom:24px">
    <div style="display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px;margin-bottom:14px" id="input-grid">
      <div>
        <div style="font-size:11px;color:#606080;font-weight:700;margin-bottom:6px;letter-spacing:1px">APNI WEBSITE</div>
        <input id="inp-url" placeholder="https://yoursite.com" style="width:100%;background:#13132e;border:1px solid #2a2a4a;border-radius:10px;padding:10px 14px;color:#e0e0f0;font-size:14px"/>
      </div>
      <div>
        <div style="font-size:11px;color:#606080;font-weight:700;margin-bottom:6px;letter-spacing:1px">NICHE</div>
        <input id="inp-niche" placeholder="e.g. signs and graphics" style="width:100%;background:#13132e;border:1px solid #2a2a4a;border-radius:10px;padding:10px 14px;color:#e0e0f0;font-size:14px"/>
      </div>
      <div>
        <div style="font-size:11px;color:#606080;font-weight:700;margin-bottom:6px;letter-spacing:1px">LOCATION</div>
        <input id="inp-loc" placeholder="e.g. Utah, US" style="width:100%;background:#13132e;border:1px solid #2a2a4a;border-radius:10px;padding:10px 14px;color:#e0e0f0;font-size:14px"/>
      </div>
    </div>
    <button class="btn" id="btn-analyze">🔍 Competitors & Citations Dhundho</button>
  </div>

  <!-- Results -->
  <div id="results"></div>

</div>

<style>
@media(max-width:600px){
  #input-grid{grid-template-columns:1fr!important}
}
</style>

<script>
let openComp = -1;
let lastData = null;

document.getElementById("btn-analyze").addEventListener("click", analyze);
document.getElementById("inp-url").addEventListener("keydown", e => { if(e.key==="Enter") analyze(); });

async function analyze() {
  const url = document.getElementById("inp-url").value.trim();
  const niche = document.getElementById("inp-niche").value.trim();
  const loc = document.getElementById("inp-loc").value.trim();
  if(!url) { showToast("URL daalo pehle!", "error"); return; }

  const btn = document.getElementById("btn-analyze");
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Competitors dhundh rahe hain…';
  openComp = -1;

  document.getElementById("results").innerHTML = `
    <div style="animation:fadeUp .4s ease">
      ${[1,2,3].map(()=>`
      <div class="card" style="display:flex;gap:14px;align-items:center">
        <div class="skel" style="width:40px;height:40px;border-radius:10px;flex-shrink:0"></div>
        <div style="flex:1">
          <div class="skel" style="height:14px;width:50%;margin-bottom:8px"></div>
          <div class="skel" style="height:11px;width:70%"></div>
        </div>
        <div class="skel" style="width:80px;height:30px;border-radius:8px"></div>
      </div>`).join("")}
    </div>`;

  try {
    // Call our backend API
    const apiUrl = window.location.origin + "/api/analyze";
    const res = await fetch(apiUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url, niche, location: loc })
    });

    if (!res.ok) throw new Error("Server error: " + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    lastData = data;
    renderResults(data);
  } catch(e) {
    console.error(e);
    document.getElementById("results").innerHTML = `
      <div class="card" style="text-align:center;padding:32px">
        <div style="font-size:32px;margin-bottom:12px">❌</div>
        <div style="color:#f08080;font-weight:700;margin-bottom:8px">Error: ${e.message}</div>
        <div style="color:#606080;font-size:13px">Dobara try karo ya URL check karo</div>
      </div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🔍 Competitors & Citations Dhundho';
  }
}

function renderResults(data) {
  const comps = data.competitors || [];
  if (!comps.length) {
    document.getElementById("results").innerHTML = `<div class="card" style="text-align:center;padding:32px;color:#606080">Koi competitor nahi mila — niche ya location change karo</div>`;
    return;
  }

  let html = `
    <div style="animation:fadeUp .4s ease">
      <div style="background:linear-gradient(135deg,#1a0d2e,#0d1a1a);border:1px solid #3a2a6a;border-radius:16px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:12px">
        <div style="font-size:28px">🌐</div>
        <div>
          <div style="color:#c0b0ff;font-weight:800;font-size:15px">${data.domain}</div>
          <div style="color:#8080b0;font-size:12px;margin-top:2px">${comps.length} competitors mile — click kar ke citations dekho</div>
        </div>
      </div>
      ${comps.map((c,i) => renderCompCard(c,i)).join("")}
    </div>`;

  document.getElementById("results").innerHTML = html;
  bindCompEvents();
}

function renderCompCard(c, i) {
  const isOpen = openComp === i;
  const hue = i * 47 + 200;
  const citeCount = (c.citations||[]).length;

  return `<div class="comp-card ${isOpen?'open':''}" id="comp-${i}">
    <div style="padding:16px 20px;display:flex;align-items:center;gap:14px" data-toggle="${i}">
      <div style="width:40px;height:40px;border-radius:10px;flex-shrink:0;background:hsl(${hue},60%,15%);color:hsl(${hue},80%,70%);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px">#${i+1}</div>
      <div style="flex:1;min-width:0">
        <div style="color:#e0e0f0;font-weight:700;font-size:15px">${c.domain}</div>
        <div style="color:#505080;font-size:12px;margin-top:2px">
          <a href="${c.url}" target="_blank" style="color:#7f5af0;text-decoration:none">${c.url.slice(0,60)}${c.url.length>60?'…':''}</a>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-shrink:0">
        <div style="background:${citeCount>3?'#1a2e1a':'#1a1a2e'};border:1px solid ${citeCount>3?'#2a5a2a':'#2a2a4a'};border-radius:8px;padding:4px 12px;font-size:12px;color:${citeCount>3?'#2cb67d':'#6060a0'};font-weight:700">
          ${citeCount} citations
        </div>
        <div style="color:#7f5af0;font-size:16px">${isOpen?'▲':'▼'}</div>
      </div>
    </div>
    ${isOpen ? renderCitations(c, i) : ''}
  </div>`;
}

function renderCitations(c, i) {
  const citations = c.citations || [];
  if (!citations.length) {
    return `<div style="padding:0 20px 16px;border-top:1px solid #1e1e3a">
      <div style="color:#505080;font-size:13px;margin-top:14px;text-align:center">
        Is competitor ki koi public citation nahi mili 🤷
      </div>
    </div>`;
  }

  return `<div style="padding:0 20px 16px;border-top:1px solid #1e1e3a">
    <div style="color:#7f5af0;font-size:11px;font-weight:800;letter-spacing:1px;margin:14px 0 10px">CITATIONS MILI HAIN — CLICK KAR KE DEKHO</div>
    <div style="display:flex;flex-wrap:wrap;gap:4px">
      ${citations.map(ct => `
        <a href="${ct.url}" target="_blank" class="cite-chip">
          🔗 ${ct.name}
          <span style="color:#404060;font-size:10px">↗</span>
        </a>
      `).join("")}
    </div>
    <div style="margin-top:14px;background:#0a0a1a;border-radius:10px;padding:12px">
      <div style="color:#2cb67d;font-size:11px;font-weight:800;margin-bottom:6px">💡 TUMHARE LIYE OPPORTUNITY</div>
      <div style="color:#60a060;font-size:12px;line-height:1.7">
        Ye competitor <b style="color:#2cb67d">${citations.length} directories</b> mein listed hai. 
        Jin mein tum nahi ho, wahan apni citation banao — local SEO mein aage nikal jaoge!
      </div>
    </div>
  </div>`;
}

function bindCompEvents() {
  document.querySelectorAll("[data-toggle]").forEach(el => {
    el.addEventListener("click", () => {
      const i = parseInt(el.dataset.toggle);
      openComp = openComp === i ? -1 : i;
      if (lastData) renderResults(lastData);
      // Restore scroll position
      setTimeout(() => {
        const card = document.getElementById(`comp-${i}`);
        if (card) card.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }, 50);
    });
  });
}

function showToast(msg, type="info") {
  const t = document.createElement("div");
  t.style.cssText = `position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:${type==="error"?"#3a1a1a":"#1a3a1a"};border:1px solid ${type==="error"?"#6a2a2a":"#2a6a2a"};color:${type==="error"?"#f08080":"#80d080"};padding:12px 24px;border-radius:12px;font-size:13px;font-weight:600;z-index:9999;font-family:inherit`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
</script>
</body>
</html>
